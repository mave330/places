<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Favoris Google Maps</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #37352f;
            --text-secondary: #787774;
            --border-color: #e9e9e7;
            --hover-bg: #f1f1ef;
            --notion-blue: #2383e2;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            color: var(--text-color);
            background-color: var(--bg-color);
            line-height: 1.5;
            padding-bottom: 60px;
        }

        .cover {
            width: 100%;
            height: 140px;
            background: linear-gradient(135deg, #f5f5f7 0%, #eef2f3 100%);
            border-bottom: 1px solid var(--border-color);
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            padding: 0 40px;
        }

        .header-section {
            margin-top: -35px;
            margin-bottom: 24px;
        }

        .icon-wrapper {
            font-size: 65px;
            background: var(--bg-color);
            width: 95px;
            height: 95px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 16px;
        }

        h1 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .description {
            color: var(--text-secondary);
            font-size: 15px;
            margin-bottom: 20px;
        }

        /* Barre de recherche Notion */
        .search-container {
            margin-bottom: 20px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 8px 12px 8px 34px;
            font-size: 14px;
            font-family: inherit;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-color);
            background-color: #fafafa;
            transition: all 0.15s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--text-secondary);
            background-color: #fff;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 13px;
        }

        .toolbar {
            display: flex;
            gap: 4px;
            margin-bottom: 28px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: none;
            border: 1px solid transparent;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
            color: var(--text-secondary);
            transition: all 0.15s;
        }

        .filter-btn:hover, .filter-btn.active {
            background-color: var(--hover-bg);
            color: var(--text-color);
        }

        .filter-btn.active {
            font-weight: 500;
        }

        .country-block {
            margin-bottom: 36px;
        }

        .country-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-color);
        }

        .city-block {
            margin-bottom: 20px;
            margin-left: 4px;
        }

        .city-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .places-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        /* Ligne de favoris pure style Notion List View */
        .place-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 8px;
            border-radius: 4px;
            text-decoration: none;
            color: inherit;
            transition: background 0.1s;
        }

        .place-item:hover {
            background-color: var(--hover-bg);
        }

        .place-left {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 0;
            gap: 1px;
        }

        .place-top-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .place-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-color);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 350px;
        }

        .place-desc {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .place-address {
            font-size: 11px;
            color: #a0a09e;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 550px;
        }

        .place-right {
            display: flex;
            align-items: center;
            margin-left: 16px;
        }

        .badge {
            font-size: 11px;
            padding: 1px 5px;
            border-radius: 3px;
            font-weight: 500;
            white-space: nowrap;
        }

        .badge-restaurant { background-color: #faeaea; color: #eb5757; }
        .badge-cafe { background-color: #f1f1ef; color: #37352f; }
        .badge-bar { background-color: #f5eae0; color: #d9730d; }
        .badge-hotel { background-color: #eaf3ec; color: #4d9367; }
        .badge-museum { background-color: #e8f4f9; color: #2383e2; }
        .badge-store { background-color: #f6edf7; color: #9b51e0; }
        .badge-default { background-color: #f1f1ef; color: #787774; }

        .maps-link-icon {
            color: #d3d3d2;
            font-size: 12px;
            transition: color 0.15s;
        }

        .place-item:hover .maps-link-icon {
            color: var(--notion-blue);
        }
    </style>
</head>
<body>

    <div class="cover"></div>

    <div class="container">
        <div class="header-section">
            <div class="icon-wrapper">📍</div>
            <h1>Mes Favoris Google Maps</h1>
            <p class="description">Un index épuré et structuré de mes repères et explorations à travers le monde.</p>
        </div>

        <div class="search-container">
            <i class="fa-solid fa-search search-icon"></i>
            <input type="text" id="search-bar" class="search-input" placeholder="Rechercher un lieu, une adresse, un type..." oninput="handleSearch()">
        </div>

        <div class="toolbar" id="toolbar">
            <button class="filter-btn active" id="btn-all" onclick="filterCountry('ALL')">Tout voir</button>
        </div>

        <div id="content-zone">
            <p style="color: var(--text-secondary); font-size: 13px;">Génération de la liste...</p>
        </div>
    </div>

    <script>
        const jsonUrl = 'places_data.json';

        const countryNames = {
            'AL': 'Albanie 🇦🇱',
            'AM': 'Arménie 🇦🇲',
            'AO': 'Angola 🇦🇴',
            'AR': 'Argentine 🇦🇷',
            'AT': 'Autriche 🇦🇹',
            'Autre': 'Non classé',
            'AU': 'Australie 🇦🇺',
            'BE': 'Belgique 🇧🇪',
            'BG': 'Bulgarie 🇧🇬',
            'BR': 'Brésil 🇧🇷',
            'BW': 'Botswana 🇧🇼',
            'BZ': 'Belize 🇧🇿',
            'CA': 'Canada 🇨🇦',
            'CH': 'Suisse 🇨🇭',
            'CL': 'Chili 🇨🇱',
            'CN': 'Chine 🇨🇳',
            'CO': 'Colombie 🇨🇴',
            'CR': 'Costa Rica 🇨🇷',
            'CZ': 'Tchéquie 🇨🇿',
            'DE': 'Allemagne 🇩🇪',
            'DK': 'Danemark 🇩🇰',
            'ES': 'Espagne 🇪🇸',
            'FI': 'Finlande 🇫🇮',
            'FR': 'France 🇫🇷',
            'GB': 'Royaume-Uni 🇬🇧',
            'GB-ENG': 'Angleterre',
            'GB-SCT': 'Écosse',
            'GB-WLS': 'Pays de Galles',
            'GR': 'Grèce 🇬🇷',
            'HK': 'Hong Kong 🇭🇰',
            'HR': 'Croatie 🇭🇷',
            'HU': 'Hongrie 🇭🇺',
            'ID': 'Indonésie 🇮🇩',
            'IN': 'Inde 🇮🇳',
            'IS': 'Islande 🇮🇸',
            'IT': 'Italie 🇮🇹',
            'JP': 'Japon 🇯🇵',
            'KH': 'Cambodge 🇰🇭',
            'KR': 'Corée du Sud 🇰🇷',
            'KZ': 'Kazakhstan 🇰🇿',
            'LK': 'Sri Lanka 🇱🇰',
            'MA': 'Maroc 🇲🇦',
            'MD': 'Moldavie 🇲🇩',
            'ME': 'Monténégro 🇲🇪',
            'MU': 'Maurice 🇲🇺',
            'MX': 'Mexique 🇲🇽',
            'MY': 'Malaisie 🇲🇾',
            'NA': 'Namibie 🇳🇦',
            'NL': 'Pays-Bas 🇳🇱',
            'NO': 'Norvège 🇳🇴',
            'NZ': 'Nouvelle-Zélande 🇳🇿',
            'OM': 'Oman 🇴🇲',
            'PA': 'Panama 🇵🇦',
            'PH': 'Philippines 🇵🇭',
            'PR': 'Porto Rico 🇵🇷',
            'PT': 'Portugal 🇵🇹',
            'RE': 'La Réunion 🇷🇪',
            'RO': 'Roumanie 🇷🇴',
            'RS': 'Serbie 🇷🇸',
            'RU': 'Russie 🇷🇺',
            'SE': 'Suède 🇸🇪',
            'SI': 'Slovénie 🇸🇮',
            'SK': 'Slovaquie 🇸🇰',
            'TH': 'Thaïlande 🇹🇭',
            'TR': 'Turquie 🇹🇷',
            'TZ': 'Tanzanie 🇹🇿',
            'US': 'États-Unis 🇺🇸',
            'VN': 'Viêt Nam 🇻🇳',
            'ZA': 'Afrique du Sud 🇿🇦',
            'ZM': 'Zambie 🇿🇲',
            'Unknown': 'Non classé'
        };

        function getPlaceMeta(name) {
            const n = name.toLowerCase();
            
            if (n.includes('restaurant') || n.includes('diner') || n.includes('brasserie') || n.includes('pizza') || n.includes('sushi') || n.includes('ramen') || n.includes('burger') || n.includes('bistrot') || n.includes('chez') || n.includes('steakhouse') || n.includes('tonkatsu') || n.includes('gyoza') || n.includes('food')) {
                return { label: 'Restaurant', class: 'badge-restaurant', desc: 'Une adresse gourmande incontournable.' };
            }
            if (n.includes('coffee') || n.includes('café') || n.includes('cafe') || n.includes('bakery') || n.includes('boulangerie') || n.includes('patisserie') || n.includes('matcha') || n.includes('brunch') || n.includes('bagels') || n.includes('espresso') || n.includes('roasters')) {
                return { label: 'Café / Brunch', class: 'badge-cafe', desc: 'Parfait pour un café de spécialité ou une pause.' };
            }
            if (n.includes('bar') || n.includes('pub') || n.includes('brewery') || n.includes('cocktail') || n.includes('wine') || n.includes('bière') || n.includes('deli')) {
                return { label: 'Bar', class: 'badge-bar', desc: 'Idéal pour se détendre autour d’un verre.' };
            }
            if (n.includes('hotel') || n.includes('resort') || n.includes('hostel') || n.includes('lodge') || n.includes('pensiunea') || n.includes('chalet') || n.includes('stay') || n.includes('inn') || n.includes('guesthouse')) {
                return { label: 'Hôtel', class: 'badge-hotel', desc: 'Hébergement sélectionné pour son cadre ou son confort.' };
            }
            if (n.includes('museum') || n.includes('musée') || n.includes('temple') || n.includes('shrine') || n.includes('parc') || n.includes('park') || n.includes('beach') || n.includes('national') || n.includes('stèle') || n.includes('monument') || n.includes('canyon') || n.includes('point') || n.includes('view') || n.includes('cascade')) {
                return { label: 'Culture / Nature', class: 'badge-museum', desc: 'Point d’intérêt culturel ou paysage naturel remarquable.' };
            }
            if (n.includes('store') || n.includes('market') || n.includes('shop') || n.includes('boutique') || n.includes('mall') || n.includes('apple') || n.includes('tech') || n.includes('books') || n.includes('station')) {
                return { label: 'Shopping', class: 'badge-store', desc: 'Boutique ou commerce de choix.' };
            }
            return { label: 'Lieu', class: 'badge-default', desc: 'Adresse remarquable repérée au fil des déplacements.' };
        }

        function detectCity(address, countryCode) {
            if (!address) return "Explorations";
            
            if (countryCode === 'JP') {
                if (address.includes('Tokyo') || address.includes('Shibuya') || address.includes('Minato') || address.includes('Shinjuku') || address.includes('Taito') || address.includes('Chuo') || address.includes('Chiyoda')) return 'Tokyo';
                if (address.includes('Sapporo')) return 'Sapporo';
                if (address.includes('Okinawa') || address.includes('Miyakojima')) return 'Okinawa';
                if (address.includes('Osaka')) return 'Osaka';
                if (address.includes('Hakone')) return 'Hakone';
                if (address.includes('Kamakura')) return 'Kamakura';
            }

            const parts = address.split(',');
            if (parts.length < 2) return "Région";
            
            let cityPart = parts[parts.length - 2].trim();
            cityPart = cityPart.replace(/\b[A-Z]{2}\s\d+\b/g, ''); 
            cityPart = cityPart.replace(/\d+/g, '').trim(); 
            
            if (cityPart.length > 22 || cityPart === "") {
                if(parts.length > 3) {
                    return parts[parts.length - 3].replace(/\d+/g, '').trim();
                }
                return parts[0].trim();
            }

            if (cityPart.toLowerCase().includes('bucure')) return 'Bucarest';
            
            return cityPart;
        }

        function isScotlandPlace(place) {
            const text = `${place.name || ''} ${place.address || ''} ${place.city || ''}`.toLowerCase();
            return [
                'scotland',
                'écosse',
                'blairgowrie',
                'perthshire',
                'pitlochry',
                'glenshee',
                'isle of skye',
                'glenfinnan',
                'achnasheen',
                'kyle of lochalsh',
                'kyle',
                'bealach',
                'strathcarron',
                'tongue',
                'quiraing',
                'glen etive',
                'braemar',
                'ballater',
                'inverness',
                'edinburgh',
                'glasgow',
                'stirling',
                'dundee',
                'aberdeen',
                'fort william',
                'oban'
            ].some(marker => text.includes(marker));
        }

        function isWalesPlace(place) {
            const text = `${place.name || ''} ${place.address || ''} ${place.city || ''}`.toLowerCase();
            return ['wales', 'pays de galles', 'snowdon', 'caernarfon', 'barry', 'cardiff', 'swansea'].some(marker => text.includes(marker));
        }

        function isEnglandPlace(place) {
            const text = `${place.name || ''} ${place.address || ''} ${place.city || ''}`.toLowerCase();
            return [
                'england',
                'angleterre',
                'durdle door',
                'wareham',
                'wrynose pass',
                'broughton-in-furness',
                'old harry rocks',
                'beachy head',
                'eastbourne',
                'lulworth cove'
            ].some(marker => text.includes(marker));
        }

        function inferCountryCode(place) {
            const address = place.address || '';
            const existingCode = place.country_code || '';

            if (existingCode === 'GB') {
                if (isScotlandPlace(place)) return 'GB-SCT';
                if (isWalesPlace(place)) return 'GB-WLS';
                if (isEnglandPlace(place)) return 'GB-ENG';
                return 'GB';
            }

            if (existingCode && existingCode !== 'Unknown') return existingCode;

            const countryByAddress = {
                'Afrique du Sud': 'ZA',
                'Albanie': 'AL',
                'Allemagne': 'DE',
                'Arménie': 'AM',
                'Autriche': 'AT',
                'Bulgarie': 'BG',
                'Canada': 'CA',
                'Chine': 'CN',
                'Corée du Sud': 'KR',
                'Espagne': 'ES',
                'États-Unis': 'US',
                'Finlande': 'FI',
                'France': 'FR',
                'Grèce': 'GR',
                'Italie': 'IT',
                'Japon': 'JP',
                'Portugal': 'PT',
                'Roumanie': 'RO',
                'Royaume-Uni': isScotlandPlace(place) ? 'GB-SCT' : (isWalesPlace(place) ? 'GB-WLS' : (isEnglandPlace(place) ? 'GB-ENG' : 'GB')),
                'Suède': 'SE',
                'Suisse': 'CH',
                'Tchéquie': 'CZ'
            };

            for (const country in countryByAddress) {
                if (address.includes(country)) return countryByAddress[country];
            }

            return 'Autre';
        }

        let allFeatures = [];
        let currentCountryFilter = 'ALL';

        function placeFromMapsUrl(url) {
            try {
                const parsedUrl = new URL(url || '');
                const rawQuery = parsedUrl.searchParams.get('q') || '';
                const decodedQuery = rawQuery.replace(/\+/g, ' ').trim();
                if (!decodedQuery) return null;

                const parts = decodedQuery.split(',').map(part => part.trim()).filter(Boolean);
                return {
                    name: parts[0] || decodedQuery,
                    address: decodedQuery,
                    country_code: /,\s*UK$/i.test(decodedQuery) || /\bUK$/i.test(decodedQuery) ? 'GB' : '',
                    city: parts[0] || ''
                };
            } catch (err) {
                return null;
            }
        }

        function normalizePlace(place) {
            return {
                properties: {
                    location: {
                        name: place.name || '',
                        address: place.address || '',
                        country_code: inferCountryCode(place),
                        city: place.city || ''
                    },
                    google_maps_url: place.url || place.google_maps_url || '#'
                }
            };
        }

        function normalizeFeature(feature) {
            const location = feature.properties && feature.properties.location;
            const fallbackPlace = placeFromMapsUrl(feature.properties && feature.properties.google_maps_url);
            const place = location || fallbackPlace || {};

            return {
                properties: {
                    location: {
                        name: place.name || '',
                        address: place.address || '',
                        country_code: inferCountryCode(place),
                        city: place.city || ''
                    },
                    google_maps_url: (feature.properties && feature.properties.google_maps_url) || '#'
                }
            };
        }

        fetch(jsonUrl)
            .then(response => {
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return response.json();
            })
            .then(data => {
                const rawFeatures = Array.isArray(data) ? data.map(normalizePlace) : (data.features || []).map(normalizeFeature);
                allFeatures = rawFeatures.filter(f => f.properties && f.properties.location && f.properties.location.address);
                generateFilters(allFeatures);
                renderPage(allFeatures);
            })
            .catch(err => {
                document.getElementById('content-zone').innerHTML = `<p style="color: #eb5757; font-size: 13px;">Erreur de chargement des données JSON.</p>`;
            });

        function generateFilters(features) {
            const countries = new Set();
            features.forEach(f => {
                if (f.properties.location.country_code) countries.add(f.properties.location.country_code);
            });

            const toolbar = document.getElementById('toolbar');
            Array.from(countries)
                .sort((a, b) => (countryNames[a] || a).localeCompare(countryNames[b] || b, 'fr'))
                .forEach(code => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.innerText = countryNames[code] || code;
                btn.onclick = () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentCountryFilter = code;
                    handleSearch(); 
                };
                toolbar.appendChild(btn);
            });
        }

        function filterCountry(code) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-all').classList.add('active');
            currentCountryFilter = code;
            handleSearch();
        }

        function handleSearch() {
            const query = document.getElementById('search-bar').value.toLowerCase();
            let filtered = allFeatures;
            
            if (currentCountryFilter !== 'ALL') {
                filtered = filtered.filter(f => f.properties.location.country_code === currentCountryFilter);
            }
            
            if (query.trim() !== '') {
                filtered = filtered.filter(f => {
                    const name = (f.properties.location.name || '').toLowerCase();
                    const addr = (f.properties.location.address || '').toLowerCase();
                    const meta = getPlaceMeta(f.properties.location.name);
                    return name.includes(query) || addr.includes(query) || meta.label.toLowerCase().includes(query);
                });
            }
            
            renderPage(filtered);
        }

        function renderPage(features) {
            const contentZone = document.getElementById('content-zone');
            contentZone.innerHTML = '';

            if (features.length === 0) {
                contentZone.innerHTML = '<p style="color: var(--text-secondary); font-size: 13px; padding: 10px 0;">Aucun favori trouvé.</p>';
                return;
            }

            const tree = {};

            features.forEach(f => {
                const loc = f.properties.location;
                const cCode = loc.country_code || 'Autre';
                const cName = countryNames[cCode] || cCode;
                const city = loc.city && loc.city !== 'Unknown' ? loc.city : detectCity(loc.address, cCode);

                if (!tree[cName]) tree[cName] = {};
                if (!tree[cName][city]) tree[cName][city] = [];

                tree[cName][city].push({
                    name: loc.name,
                    address: loc.address,
                    url: f.properties.google_maps_url
                });
            });

            for (const country in tree) {
                const countryBlock = document.createElement('div');
                countryBlock.className = 'country-block';
                countryBlock.innerHTML = `<div class="country-title"><i class="fa-regular fa-folder" style="color: var(--text-secondary); font-size: 15px;"></i> ${country}</div>`;

                for (const city in tree[country]) {
                    const cityBlock = document.createElement('div');
                    cityBlock.className = 'city-block';
                    cityBlock.innerHTML = `<div class="city-title">${city}</div>`;

                    const list = document.createElement('div');
                    list.className = 'places-list';

                    tree[country][city].forEach(place => {
                        const meta = getPlaceMeta(place.name);
                        
                        const item = document.createElement('a');
                        item.className = 'place-item';
                        item.href = place.url;
                        item.target = '_blank';
                        item.innerHTML = `
                            <div class="place-left">
                                <div class="place-top-row">
                                    <span class="place-name">${place.name}</span>
                                    <span class="badge ${meta.class}">${meta.label}</span>
                                    <span class="place-desc">— ${meta.desc}</span>
                                </div>
                                <div class="place-address">${place.address}</div>
                            </div>
                            <div class="place-right">
                                <i class="fa-solid fa-arrow-up-right-from-square maps-link-icon"></i>
                            </div>
                        `;
                        list.appendChild(item);
                    });

                    cityBlock.appendChild(list);
                    countryBlock.appendChild(cityBlock);
                }
                contentZone.appendChild(countryBlock);
            }
        }
    </script>
</body>
